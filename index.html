<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shree Balaji Suppliers | Gitti, Bajri Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Oswald', sans-serif; }
        .bg-construction { background-color: #F5B301; }
        .text-construction { color: #F5B301; }
    </style>
</head>
<body class="bg-gray-50">

    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 bg-[#1A1A1A] text-white border-b-2 border-yellow-500 p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="text-xl font-bold uppercase tracking-tighter">Shree <span class="text-construction">Balaji</span></div>
            <a href="tel:+919999999999" class="bg-construction text-black px-4 py-1 font-bold rounded">Call Now</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="relative h-[80vh] bg-black flex items-center pt-16 overflow-hidden">
        <div class="absolute inset-0 opacity-40">
            <img src="https://images.unsplash.com/photo-1517581177682-a085bb7ffb15?auto=format&fit=crop&q=80" class="w-full h-full object-cover">
        </div>
        <div class="relative z-10 px-6 max-w-4xl">
            <h1 class="text-5xl md:text-7xl text-white uppercase leading-tight font-bold">
                Stone, Gitti & <br><span class="text-construction">Bajri Delivery</span>
            </h1>
            <p class="mt-4 text-gray-300 text-lg">Bijainagar में सबसे तेज़ डिलीवरी और सही क्वालिटी।</p>
            <div class="mt-8 flex gap-4">
                <a href="#booking" class="bg-construction text-black font-bold px-8 py-4 uppercase">Book Now</a>
            </div>
        </div>
    </section>

    <!-- Today Rates -->
    <section class="py-12 px-4 bg-white">
        <div class="max-w-4xl mx-auto border-t-4 border-yellow-500 shadow-2xl rounded-lg overflow-hidden">
            <div class="bg-gray-900 text-white p-4 flex justify-between items-center">
                <h2 class="text-xl font-bold uppercase italic">Aaj Ka Rate</h2>
                <span id="updateTime" class="text-[10px] text-gray-400 font-bold uppercase">Updating...</span>
            </div>
            <table class="w-full text-left">
                <tr class="border-b">
                    <td class="p-4 font-bold text-gray-700">Banas Bajri</td>
                    <td class="p-4 text-red-600 font-bold text-xl" id="displayBajri">Loading...</td>
                </tr>
                <tr class="border-b">
                    <td class="p-4 font-bold text-gray-700">20mm Gitti</td>
                    <td class="p-4 text-red-600 font-bold text-xl" id="displayGitti">Loading...</td>
                </tr>
                <tr class="border-b">
                    <td class="p-4 font-bold text-gray-700">Crusher Dust</td>
                    <td class="p-4 text-red-600 font-bold text-xl" id="displayDust">Loading...</td>
                </tr>
            </table>
        </div>
    </section>

    <!-- Booking Form -->
    <section id="booking" class="py-16 px-4 bg-gray-900 text-white">
        <div class="max-w-lg mx-auto bg-white text-black p-6 rounded-xl">
            <h2 class="text-2xl font-bold text-center mb-6 uppercase">Order Booking</h2>
            <form onsubmit="handleBooking(event)" class="space-y-4">
                <input type="text" id="custName" placeholder="Full Name" class="w-full p-3 border-2 rounded outline-none" required>
                <input type="tel" id="custPhone" placeholder="Mobile Number" class="w-full p-3 border-2 rounded outline-none" required>
                <select id="custMaterial" class="w-full p-3 border-2 rounded outline-none">
                    <option>Bajri</option>
                    <option>Gitti (Stone)</option>
                    <option>Crusher Dust</option>
                </select>
                <select id="custVehicle" class="w-full p-3 border-2 rounded outline-none">
                    <option>Tractor (Trolley)</option>
                    <option>Dumper</option>
                    <option>Mini Truck</option>
                </select>
                <textarea id="custAddress" placeholder="Delivery Address" class="w-full p-3 border-2 rounded h-24 outline-none" required></textarea>
                <button type="submit" class="w-full bg-construction font-bold py-4 rounded uppercase text-lg shadow-lg">Confirm Order</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer class="p-10 bg-black text-white text-center text-sm">
        &copy; 2024 SHREE BALAJI SUPPLIERS | Bijainagar, Rajasthan
    </footer>

    <!-- Floating WhatsApp -->
    <a href="https://wa.me/919999999999" class="fixed bottom-6 right-6 bg-green-500 text-white p-4 rounded-full shadow-2xl z-[99]">
        <i class="fa-brands fa-whatsapp text-3xl"></i>
    </a>

    <!-- Firebase Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        // --- यहाँ अपना Firebase Config पेस्ट करें ---
        const firebaseConfig = {
  apiKey: "AIzaSyB9IBhO5YG0LWhzeEle8JPPmN0-kXsByrY",
  authDomain: "balaji-supplier.firebaseapp.com",
  projectId: "balaji-supplier",
  storageBucket: "balaji-supplier.firebasestorage.app",
  messagingSenderId: "961021823028",
  appId: "1:961021823028:web:940d2a635f23affb43e261"
};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // रेट्स सुनना (Live Updates)
        onSnapshot(doc(db, "prices", "today"), (doc) => {
            const data = doc.data();
            if (data) {
                document.getElementById('displayBajri').innerText = "₹" + data.bajriRate;
                document.getElementById('displayGitti').innerText = "₹" + data.gittiRate;
                document.getElementById('displayDust').innerText = "₹" + data.dustRate;
                document.getElementById('updateTime').innerText = "Last Update: " + data.time;
            }
        });

        // बुकिंग हैंडल करना
        window.handleBooking = async function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "Booking...";
            
            try {
                await addDoc(collection(db, "bookings"), {
                    name: document.getElementById('custName').value,
                    phone: document.getElementById('custPhone').value,
                    material: document.getElementById('custMaterial').value,
                    vehicle: document.getElementById('custVehicle').value,
                    address: document.getElementById('custAddress').value,
                    status: "PENDING",
                    timestamp: serverTimestamp()
                });
                alert("शुक्रिया! आपका ऑर्डर बुक हो गया है।");
                e.target.reset();
            } catch (err) {
                alert("Error: " + err.message);
            }
            btn.innerText = "Confirm Order";
        };
    </script>
</body>
</html>
