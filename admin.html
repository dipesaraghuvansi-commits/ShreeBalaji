<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balaji Admin | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        #adminDashboard { display: none; }
        .bg-construction { background-color: #F5B301; }
    </style>
</head>
<body class="bg-gray-900">

    <!-- Login -->
    <div id="loginBox" class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white rounded-xl shadow-2xl p-8 max-w-sm w-full text-center">
            <h1 class="text-2xl font-black uppercase mb-4 tracking-tighter">Admin Login</h1>
            <input type="password" id="adminPass" placeholder="Enter Password" class="w-full p-3 border rounded-lg mb-4 outline-none focus:ring-2 focus:ring-yellow-500 text-center">
            <button onclick="login()" class="w-full bg-black text-white font-bold py-3 rounded-lg uppercase">Go to Dashboard</button>
            <p id="error" class="text-red-500 text-xs mt-2 hidden">Wrong Password!</p>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="adminDashboard" class="min-h-screen bg-gray-100">
        <header class="bg-gray-900 text-white p-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-yellow-500 uppercase">Balaji Boss</h1>
            <button onclick="logout()" class="text-sm bg-red-600 px-3 py-1 rounded">Logout</button>
        </header>

        <main class="p-4 space-y-6">
            <!-- Rate Control -->
            <div class="bg-white p-6 rounded-xl shadow-md">
                <h3 class="font-bold mb-4 uppercase border-l-4 border-yellow-500 pl-2">Update Prices</h3>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <input type="text" id="inBajri" placeholder="Bajri Rate" class="p-3 border rounded outline-none focus:ring-2 focus:ring-yellow-500">
                    <input type="text" id="inGitti" placeholder="Gitti Rate" class="p-3 border rounded outline-none focus:ring-2 focus:ring-yellow-500">
                    <input type="text" id="inDust" placeholder="Dust Rate" class="p-3 border rounded outline-none focus:ring-2 focus:ring-yellow-500">
                </div>
                <button onclick="updatePrice()" id="upBtn" class="w-full bg-construction font-bold py-3 rounded shadow uppercase">Update Live Now</button>
            </div>

            <!-- Orders List -->
            <div class="bg-white rounded-xl shadow-md overflow-hidden">
                <div class="bg-gray-50 p-4 font-bold uppercase border-b text-sm">New Bookings</div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-100 text-[10px] text-gray-500 uppercase">
                            <tr>
                                <th class="p-4">Customer</th>
                                <th class="p-4">Order</th>
                                <th class="p-4">Address</th>
                            </tr>
                        </thead>
                        <tbody id="orderList" class="text-sm divide-y">
                            <!-- Orders will load here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const firebaseConfig = {
  apiKey: "AIzaSyB9IBhO5YG0LWhzeEle8JPPmN0-kXsByrY",
  authDomain: "balaji-supplier.firebaseapp.com",
  projectId: "balaji-supplier",
  storageBucket: "balaji-supplier.firebasestorage.app",
  messagingSenderId: "961021823028",
  appId: "1:961021823028:web:940d2a635f23affb43e261"
};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- Login Logic ---
        window.login = function() {
            const pass = document.getElementById('adminPass').value;
            if(pass === "BALAJI@BOSS") {
                localStorage.setItem('adminLogin', 'true');
                showDashboard();
            } else {
                document.getElementById('error').classList.remove('hidden');
            }
        }

        window.logout = function() {
            localStorage.removeItem('adminLogin');
            location.reload();
        }

        function showDashboard() {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'block';
            loadOrders();
        }

        if(localStorage.getItem('adminLogin') === 'true') showDashboard();

        // --- Update Price Logic ---
        window.updatePrice = async function() {
            const btn = document.getElementById('upBtn');
            btn.innerText = "Updating...";
            try {
                await setDoc(doc(db, "prices", "today"), {
                    bajriRate: document.getElementById('inBajri').value,
                    gittiRate: document.getElementById('inGitti').value,
                    dustRate: document.getElementById('inDust').value,
                    time: new Date().toLocaleTimeString()
                });
                alert("Prices Updated Live!");
            } catch(e) { alert(e.message); }
            btn.innerText = "Update Live Now";
        }

        // --- Load Orders Logic ---
        function loadOrders() {
            const q = query(collection(db, "bookings"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('orderList');
                list.innerHTML = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    list.innerHTML += `
                        <tr class="hover:bg-yellow-50">
                            <td class="p-4 font-bold text-gray-800">${data.name}<br><a href="tel:${data.phone}" class="text-blue-500 font-normal text-xs underline">${data.phone}</a></td>
                            <td class="p-4 text-xs font-semibold uppercase text-gray-600">${data.material}<br>${data.vehicle}</td>
                            <td class="p-4 text-[10px] text-gray-500 italic uppercase">${data.address}</td>
                        </tr>
                    `;
                });
            });
        }
    </script>
</body>
                </html>
